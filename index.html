<style>
  /* ===== DESKTOP LAYOUT (≥1024px) ===== */
  @media (min-width: 1024px) {
    body {
      min-height: 100dvh;
    }

    /* Header */
    .desktop-header {
      display: flex !important;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      max-width: 1280px;
      margin: 0 auto;
      width: 100%;
    }
    header {
      justify-content: center;
    }
    header > img {
      height: 3rem;
    }

    /* Page wrapper: sidebar + content */
    .desktop-page-wrapper {
      display: flex;
      gap: 0;
      max-width: 1280px;
      margin: 0 auto;
      min-height: calc(100dvh - 64px);
    }

    /* Sidebar */
    .desktop-sidebar {
      display: block !important;
      width: 280px;
      min-width: 280px;
      flex-shrink: 0;
      padding: 2rem 1.5rem;
      border-right: 1px solid #e2e8f0;
      position: sticky;
      top: 64px;
      height: calc(100dvh - 64px);
      overflow-y: auto;
    }
    .dark .desktop-sidebar {
      border-right-color: #2d3748;
    }

    /* Main content area */
    .desktop-main-content {
      flex: 1;
      padding: 2rem;
      min-width: 0;
    }

    /* Hide mobile filter row */
    .mobile-filters-row {
      display: none !important;
    }

    /* Desktop search */
    .desktop-search-wrapper {
      display: block !important;
      margin-bottom: 1.5rem;
    }

    /* Cards grid */
    .desktop-cards-grid {
      display: grid !important;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
    }
    /* Remove stacked single-column layout on desktop */
    .desktop-cards-grid .space-y-5 {
      display: contents;
    }

    /* Make all desktop cards same height style (no "featured" banner difference) */
    .desktop-cards-grid article {
      height: 100%;
    }

    /* Sidebar filter sections */
    .sidebar-section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a0aec0;

    .sidebar-section-title:first-child {

      gap: 0.35rem;

      display: flex;
      align-items: center;
      gap: 0.5rem;

      border-radius: 0.75rem;

<style>
    body {
      min-height: max(884px, 100dvh);
    }
    /* Dropdown popover */
    .filter-dropdown {
      position: relative;
    }
    .filter-popover {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 200;
      background: white;
      border-radius: 1rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);

    }

    }
    .filter-chip {

      border-color: #4a5568;
      color: #a0aec0;

    .filter-chip:hover, .filter-chip.active {

      border-color: #00a8e8 !important;

    /* ===== ANIMATIONS ===== */

    /* Header slide down */
    @keyframes headerSlideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    header { animation: headerSlideDown 0.5s cubic-bezier(0.22,1,0.36,1) both; }

    /* Hero section fade+rise */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    main > .space-y-4 { animation: fadeUp 0.6s 0.15s cubic-bezier(0.22,1,0.36,1) both; }

    /* Filter row */
    main > .flex { animation: fadeUp 0.6s 0.3s cubic-bezier(0.22,1,0.36,1) both; }

    /* Cards scroll reveal */
    .card-reveal {
      opacity: 0;
      transform: translateY(40px) scale(0.97);
      transition: opacity 0.55s cubic-bezier(0.22,1,0.36,1),
                  transform 0.55s cubic-bezier(0.22,1,0.36,1);
    }
    .card-reveal.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* Card hover lift + glow */
    article {
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1),
                  box-shadow 0.25s ease;
    }
    article:hover {
      transform: translateY(-5px) scale(1.012);
      box-shadow: 0 16px 40px rgba(0,168,232,0.18);
    }

    /* Search bar animated glow ring */
    input[type="text"] {
      transition: box-shadow 0.3s ease, transform 0.2s ease;
    }
    input[type="text"]:focus {
      box-shadow: 0 0 0 3px rgba(0,168,232,0.25), 0 4px 12px rgba(0,168,232,0.1);
      transform: scale(1.01);
    }

    /* Filter button hover */
    .filter-dropdown button:first-child {
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }
    .filter-dropdown button:first-child:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,168,232,0.15);
    }
    .filter-dropdown button:first-child:active {
      transform: scale(0.95);
    }

    /* Popover slide-in */
    @keyframes popoverIn {
      from { opacity: 0; transform: translateY(-8px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0)  scale(1); }
    }
    .filter-popover.open {
      animation: popoverIn 0.22s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* Chip selection pop */
    .filter-chip {
      transition: background 0.15s, border-color 0.15s, color 0.15s,
                  transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
    }
    .filter-chip:active { transform: scale(0.9); }
    .filter-chip.active { transform: scale(1.05); }

    /* Inscribirse button pulse */
    @keyframes pulseCTA {

    }
    button.text-primary { transition: color 0.2s, transform 0.15s; }
    button.text-primary:hover { transform: translateX(3px); }

    /* Shimmer on featured card badge */
    @keyframes shimmer {

    }

      background: linear-gradient(90deg, #ffd100 25%, #ffe566 50%, #ffd100 75%);

    }
    article:hover span.absolute.-top-4 {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(0,168,232,0.25);
    }
  </style>

<script>
  const allPopoverIds = ['pop-barrios', 'pop-talleres', 'pop-edades'];
  const allBtnIds    = ['btn-barrios', 'btn-talleres', 'btn-edades'];
  const allIconIds   = ['icon-barrios','icon-talleres','icon-edades'];

  function toggleDropdown(popId, btnId) {
    const isOpen = document.getElementById(popId).classList.contains('open');
    allPopoverIds.forEach(id => document.getElementById(id).classList.remove('open'));
    allBtnIds.forEach(id => document.getElementById(id).classList.remove('filter-btn-active'));
    allIconIds.forEach(id => document.getElementById(id).textContent = 'arrow_drop_down');
    if (!isOpen) {
      document.getElementById(popId).classList.add('open');
      document.getElementById(btnId).classList.add('filter-btn-active');
      document.getElementById(btnId.replace('btn-','icon-')).textContent = 'arrow_drop_up';
    }
  }

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.filter-dropdown')) {
      allPopoverIds.forEach(id => document.getElementById(id).classList.remove('open'));
      allBtnIds.forEach(id => document.getElementById(id).classList.remove('filter-btn-active'));
      allIconIds.forEach(id => document.getElementById(id).textContent = 'arrow_drop_down');
    }
  });

  function attachChipListeners(popover) {
    popover.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', function(e) {
        e.stopPropagation();
        popover.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        applyFilters();
      });
    });
  }

  // Attach listeners to static popovers (barrios, edades)
  document.querySelectorAll('#pop-barrios, #pop-edades').forEach(attachChipListeners);

  // ── Desktop sidebar chip listeners ────────────────────────────
  function attachSidebarChipListeners(container) {
    container.querySelectorAll('.sidebar-chip').forEach(chip => {
      chip.addEventListener('click', function() {
        const filterType = this.dataset.filter2;
        container.querySelectorAll('.sidebar-chip').forEach(c => c.classList.remove('active'));
        this.classList.add('active');
        applyFilters();
      });
    });
  }
  document.querySelectorAll('#sidebar-barrios, #sidebar-edades, #sidebar-categorias').forEach(attachSidebarChipListeners);

  // ── Load categories dynamically from Firestore ────────────────
  function loadCategoryChips() {
    const waitForDb = setInterval(() => {
      if (!window.db || !window.onSnapshot) return;
      clearInterval(waitForDb);
      window.onSnapshot(window.collection(window.db, 'categories'), (snapshot) => {
        const cats = snapshot.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .sort((a, b) => (a.order || 0) - (b.order || 0));

        // ── Populate mobile dropdown ──
        const pop = document.getElementById('pop-talleres');
        pop.querySelectorAll('.filter-chip:not([data-value=""])').forEach(c => c.remove());
        const loading = document.getElementById('category-chips-loading');
        if (loading) loading.remove();
        cats.forEach(cat => {
          const btn = document.createElement('button');
          btn.className = 'filter-chip';
          btn.dataset.filter = 'category';
          btn.dataset.value  = cat.name;
          btn.textContent    = `${cat.emoji} ${cat.name}`;
          pop.appendChild(btn);
        });
        attachChipListeners(pop);

        // ── Populate desktop sidebar ──
        const sidebarCats = document.getElementById('sidebar-categorias');
        sidebarCats.querySelectorAll('.sidebar-chip:not([data-value2=""])').forEach(c => c.remove());
        const sidebarLoading = document.getElementById('sidebar-cats-loading');
        if (sidebarLoading) sidebarLoading.remove();
        cats.forEach(cat => {
          const btn = document.createElement('button');
          btn.className = 'sidebar-chip';
          btn.dataset.filter2 = 'category';
          btn.dataset.value2  = cat.name;
          btn.innerHTML = `<span class="material-icons" style="font-size:17px">school</span>${cat.emoji} ${cat.name}`;
          sidebarCats.appendChild(btn);
        });
        attachSidebarChipListeners(sidebarCats);
      });
    }, 100);
  }

  document.addEventListener('DOMContentLoaded', loadCategoryChips);
</script>

<script>

  // ── Build card HTML ───────────────────────────────────────────
  function buildCardHTML(doc, isFirst) {
    const data = doc.data;
    const bannerStyle = data.imageUrl
      ? `background-image: url('${data.imageUrl}'); background-size: cover; background-position: center;`
      : `background-color: ${data.bannerColor || '#3b82f6'};`;
    const bannerClass = isFirst ? 'h-32' : 'h-24';
    const badgeHTML = isFirst
      ? `<span class="absolute top-3 left-3 bg-secondary text-gray-900 text-xs font-bold px-3 py-1 rounded-full shadow-sm z-10 uppercase tracking-wider">Último Lanzamiento</span>`
      : '';
    const descHTML = isFirst && data.description
      ? `<p class="text-sm text-text-muted-light dark:text-text-muted-dark line-clamp-2">${data.description}</p>`
      : '';
    const overlayHTML = data.imageUrl
      ? `<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>`
      : '';
    return `
      <a href="descripcion.html?id=${doc.id}" class="block no-underline">
      <article class="bg-white dark:bg-card-dark rounded-2xl shadow-${isFirst ? 'md' : 'sm border border-gray-100 dark:border-gray-800'} overflow-hidden flex flex-col transition-transform active:scale-[0.98] cursor-pointer">
        <div class="${bannerClass} relative flex items-center justify-center overflow-hidden" style="${bannerStyle}">
          ${badgeHTML}
          <span class="material-icons text-white/${data.imageUrl?'90':'50'} text-5xl z-10 ${data.imageUrl?'drop-shadow-lg':''}">${data.icon || 'music_note'}</span>
          ${overlayHTML}
        </div>
        <div class="p-4 flex flex-col gap-3 relative">
          <span class="absolute -top-4 right-4 bg-white dark:bg-card-dark text-primary font-bold text-xs px-3 py-1 rounded-full shadow-md border border-gray-100 dark:border-gray-700 uppercase tracking-wider">${data.category}</span>
          <div>
            <h3 class="text-lg font-bold text-gray-900 dark:text-white leading-tight mb-1">${data.title}</h3>
            ${descHTML}
          </div>
          <div class="space-y-1.5 ${isFirst?'mt-1':'}'}">
            <div class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-300">
              <span class="material-icons text-[16px] text-gray-400">location_on</span>
              <span>${data.location}</span>
            </div>
            <div class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-300">
              <span class="material-icons text-[16px] text-gray-400">calendar_today</span>
              <span>${Array.isArray(data.dias) && data.dias.length ? data.dias.join(', ') : (data.schedule || "—")}</span>
            </div>
            <div class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-300">
              <span class="material-icons text-[16px] text-gray-400">schedule</span>
              <span>${data.horaInicio ? (data.horaFin ? data.horaInicio + " – " + data.horaFin + " hs" : data.horaInicio + " hs") : (data.schedule || "—")}</span>
            </div>
          </div>
          <div class="mt-2 flex justify-between items-center border-t border-gray-100 dark:border-gray-700 pt-3">
            <span class="text-xs font-semibold text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded">${data.ageText}</span>
            <div class="flex items-center gap-2">
              <span class="text-xs font-bold px-2 py-1 rounded-full ${data.costo === 'arancelado' ? 'bg-orange-100 text-orange-600' : 'bg-green-100 text-green-700'}">${data.costo === 'arancelado' ? 'Arancelado' : 'Gratuito'}</span>
              <span class="text-primary font-bold text-sm flex items-center gap-1 uppercase tracking-wide">
                ${isFirst ? 'Inscribirse' : 'Ver más'} <span class="material-icons text-[18px]">${isFirst ? 'arrow_forward' : 'chevron_right'}</span>
              </span>
            </div>
          </div>
        </div>
      </article>
      </a>
    `;
  }

  // ── Render a list of workshops ────────────────────────────────
  function renderWorkshops(list) {
    const container = document.getElementById('workshopsContainer');
    if (list.length === 0) {
      container.innerHTML = '<p class="text-center text-gray-400 py-10">No se encontraron talleres para tu búsqueda.</p>';
      const rc = document.getElementById('result-count'); if (rc) rc.textContent = '';
      return;
    }
    container.innerHTML = list.map((doc, i) => buildCardHTML(doc, i === 0)).join('');
    const rc = document.getElementById('result-count');
    if (rc) rc.textContent = `${list.length} taller${list.length !== 1 ? 'es' : ''} encontrado${list.length !== 1 ? 's' : ''}`;
    initScrollReveal();
  }

  // ── Apply search + filters (mobile + desktop) ─────────────────
  function applyFilters() {
    const isDesktop = window.matchMedia('(min-width: 1024px)').matches;

    const mobileQuery  = (document.getElementById('search-input')?.value || '').toLowerCase().trim();
    const desktopQuery = (document.getElementById('search-input-desktop')?.value || '').toLowerCase().trim();
    const query = isDesktop ? desktopQuery : mobileQuery;

    const mobileBarrio   = (document.querySelector('#pop-barrios .filter-chip.active')?.dataset.value   || '').toLowerCase();
    const mobileCategory = (document.querySelector('#pop-talleres .filter-chip.active')?.dataset.value  || '').toLowerCase();
    const mobileEdad     = (document.querySelector('#pop-edades .filter-chip.active')?.dataset.value    || '').toLowerCase();

    const sidebarBarrio   = (document.querySelector('#sidebar-barrios .sidebar-chip.active')?.dataset.value2   || '').toLowerCase();
    const sidebarCategory = (document.querySelector('#sidebar-categorias .sidebar-chip.active')?.dataset.value2 || '').toLowerCase();
    const sidebarEdad     = (document.querySelector('#sidebar-edades .sidebar-chip.active')?.dataset.value2     || '').toLowerCase();

    const activeBarrio   = isDesktop ? sidebarBarrio   : mobileBarrio;
    const activeCategory = isDesktop ? sidebarCategory : mobileCategory;
    const activeEdad     = isDesktop ? sidebarEdad     : mobileEdad;

    const filtered = window.allWorkshops.filter(({data}) => {
      if (query) {
        const haystack = [
          data.title, data.description, data.location, data.schedule, data.category, data.ageText
        ].join(' ').toLowerCase();
        if (!haystack.includes(query)) return false;
      }
      if (activeBarrio   && !(data.location || '').toLowerCase().includes(activeBarrio)) return false;
      if (activeCategory && (data.category  || '').toLowerCase() !== activeCategory)     return false;
      if (activeEdad     && !(data.ageText  || '').toLowerCase().includes(activeEdad))   return false;
      return true;
    });

    renderWorkshops(filtered);
  }

  // ── Fetch workshops from Firebase ────────────────────────────
  async function loadWorkshops() {
    if (!window.db) { setTimeout(loadWorkshops, 100); return; }
    try {
      const container = document.getElementById('workshopsContainer');
      const querySnapshot = await window.getDocs(window.collection(window.db, "workshops"));
      if (querySnapshot.empty) {
        container.innerHTML = '<p class="text-center text-gray-500 py-8">No hay talleres disponibles por el momento.</p>';
        return;
      }
      // Store all data in memory
      window.allWorkshops = [];
      querySnapshot.forEach((doc) => {
        window.allWorkshops.push({ id: doc.id, data: doc.data() });
      });
      // Initial render (no filters)
      renderWorkshops(window.allWorkshops);
    } catch (e) {
      console.error('Error loading workshops:', e);
      document.getElementById('workshopsContainer').innerHTML =
        '<p class="text-center text-red-500 py-8">Error al cargar talleres. Intente nuevamente.</p>';
    }
  }

  // ── Scroll-reveal for dynamic cards ──────────────────────────
  function initScrollReveal() {
    const cards = document.querySelectorAll('article');
    cards.forEach((card, i) => {
      card.classList.add('card-reveal');
      card.style.transitionDelay = (i * 0.12) + 's';
    });
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    cards.forEach(card => observer.observe(card));
  }

  // Start loading
  document.addEventListener('DOMContentLoaded', loadWorkshops);

  // ── Ripple effect on filter buttons ─────────────────────────
  document.querySelectorAll('.filter-dropdown > button').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const ripple = document.createElement('span');
      ripple.style.cssText = `
        position:absolute; border-radius:50%; background:rgba(0,168,232,0.25);
        width:60px; height:60px; transform:scale(0); animation:rippleAnim 0.5s linear;
        left:${e.offsetX - 30}px; top:${e.offsetY - 30}px; pointer-events:none;
      `;
      this.style.position = 'relative';
      this.style.overflow = 'hidden';
      this.appendChild(ripple);
      setTimeout(() => ripple.remove(), 500);
    });
  });
</script>

<style>
  @keyframes rippleAnim {
    to { transform: scale(3); opacity: 0; }
  }
</style>

</body></html>
